{% extends "base.html" %} {% block title %}Register{% endblock %} {% block content %}

<div class="auth-wrapper">
	<div class="auth-card">
		<div class="auth-header">
			<h2>Create Account</h2>
			<p>Join Gruha Alankara and start designing</p>
		</div>

		<form method="POST" action="{{ url_for('register') }}" class="auth-form">
			<div class="form-group">
				<label for="username">Username</label>
				<input type="text" id="username" name="username" placeholder="Choose a username" required autofocus />
			</div>

			<div class="form-group">
				<label for="email">Email</label>
				<input type="email" id="email" name="email" placeholder="you@example.com" required />
			</div>

			<div class="form-group">
				<label for="password">Password</label>
				<input type="password" id="password" name="password" placeholder="Create a password" required />
			</div>

			<button type="submit" class="btn btn-full">Create Account</button>
		</form>

		<p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
	</div>
</div>

{% endblock %}
